<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Weather Dashboard - Real-time weather data from OpenWeatherMap API">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #48bb78;
            --warning-color: #f6ad55;
            --danger-color: #f56565;
            --dark-bg: #1a202c;
            --light-bg: #f7fafc;
            --text-dark: #2d3748;
            --text-light: #718096;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-primary {
            background: white;
            color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .quick-search {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .quick-search button {
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .quick-search button:hover {
            background: rgba(255,255,255,0.25);
            border-color: white;
        }

        .content {
            animation: fadeIn 0.8s ease-out;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }

        .current-weather {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
            border: 2px solid var(--border-color);
        }

        .current-weather.loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.5);
            animation: pulse 1.5s infinite;
        }

        .weather-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
        }

        .weather-info h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .temperature {
            font-size: 4rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 15px 0;
        }

        .weather-description {
            font-size: 1.2rem;
            color: var(--text-light);
            text-transform: capitalize;
            margin-bottom: 15px;
        }

        .weather-icon {
            width: 150px;
            height: 150px;
            font-size: 100px;
            text-align: center;
            line-height: 150px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: var(--light-bg);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .forecast-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .forecast-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .forecast-time {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .error-message {
            background: var(--danger-color);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.4s ease-out;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .loading i {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: spin 2s linear infinite;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2rem;
        }

        .chart-container {
            grid-column: 1 / -1;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .chart-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .units-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .unit-btn {
            padding: 8px 16px;
            background: var(--light-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .unit-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .weather-main {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .weather-icon {
                width: 100px;
                height: 100px;
                font-size: 70px;
                line-height: 100px;
            }

            .temperature {
                font-size: 3rem;
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .card {
                padding: 20px;
            }
        }

        .weather-alerts {
            grid-column: 1 / -1;
            background: var(--warning-color);
            color: white;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }

        .weather-alerts.show {
            display: block;
        }

        .alert-title {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .air-quality {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        .aqi-badge {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .aqi-1 { background: var(--success-color); }
        .aqi-2 { background: #4CAF50; }
        .aqi-3 { background: var(--warning-color); }
        .aqi-4 { background: #ff7043; }
        .aqi-5 { background: var(--danger-color); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p>Real-time weather data from OpenWeatherMap API</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name (e.g., New York, London, Tokyo)"
                    autocomplete="off"
                >
                <button class="btn btn-primary" onclick="searchWeather()">
                    <i class="fas fa-search"></i> Search
                </button>
                <button class="btn btn-secondary" onclick="getLocationWeather()" title="Get weather for your location">
                    <i class="fas fa-location-dot"></i> My Location
                </button>
            </div>
            <div class="quick-search">
                <button onclick="searchCity('New York')">New York</button>
                <button onclick="searchCity('London')">London</button>
                <button onclick="searchCity('Tokyo')">Tokyo</button>
                <button onclick="searchCity('Dubai')">Dubai</button>
                <button onclick="searchCity('Paris')">Paris</button>
                <button onclick="searchCity('Sydney')">Sydney</button>
            </div>
        </div>

        <div class="units-toggle">
            <button class="unit-btn active" onclick="toggleUnit('metric')">°C / km/h</button>
            <button class="unit-btn" onclick="toggleUnit('imperial')">°F / mph</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="content" id="content"></div>

        <div class="footer">
            <p>Data provided by <a href="https://openweathermap.org/" style="color: white; text-decoration: underline;" target="_blank">OpenWeatherMap</a></p>
        </div>
    </div>

    <script>
        const API_KEY = '5d7f0a78041e31ea7a185328bb566357'; // Free API key from OpenWeatherMap
        let currentUnit = 'metric';
        let currentWeatherData = null;
        let forecastData = null;

        const weatherIconMap = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '☁️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        const aqiLabels = ['Good', 'Fair', 'Moderate', 'Poor', 'Very Poor'];

        function toggleUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.unit-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (currentWeatherData) {
                displayWeather(currentWeatherData, forecastData);
            }
        }

        function searchCity(city) {
            document.getElementById('cityInput').value = city;
            searchWeather();
        }

        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            fetchWeatherData(city);
        }

        function getLocationWeather() {
            if (navigator.geolocation) {
                showLoading();
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const { latitude, longitude } = position.coords;
                        fetchWeatherByCoordinates(latitude, longitude);
                    },
                    error => {
                        showError('Unable to access your location. Please enable location services.');
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser');
            }
        }

        function showLoading() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading weather data...</p>
                </div>
            `;
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }

        async function fetchWeatherData(city) {
            showLoading();
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=${currentUnit}&appid=${API_KEY}`
                );
                
                if (!response.ok) {
                    throw new Error('City not found. Please check the spelling and try again.');
                }

                const data = await response.json();
                currentWeatherData = data;

                // Fetch forecast data
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=${currentUnit}&appid=${API_KEY}`
                );
                forecastData = await forecastResponse.json();

                // Fetch Air Quality data
                const aqResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/air_pollution?lat=${data.coord.lat}&lon=${data.coord.lon}&appid=${API_KEY}`
                );
                const aqData = await aqResponse.json();

                displayWeather(data, forecastData, aqData);
                document.getElementById('cityInput').value = '';
            } catch (error) {
                showError(error.message);
                document.getElementById('content').innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-cloud-question" style="font-size: 3rem; margin-bottom: 15px;"></i>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function fetchWeatherByCoordinates(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${API_KEY}`
                );
                const data = await response.json();
                currentWeatherData = data;

                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${API_KEY}`
                );
                forecastData = await forecastResponse.json();

                const aqResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`
                );
                const aqData = await aqResponse.json();

                displayWeather(data, forecastData, aqData);
            } catch (error) {
                showError('Error fetching weather data');
            }
        }

        function displayWeather(data, forecast, aqData) {
            const windUnit = currentUnit === 'metric' ? 'km/h' : 'mph';
            const tempUnit = currentUnit === 'metric' ? '°C' : '°F';
            const icon = weatherIconMap[data.weather[0].icon] || '🌤️';

            let html = `
                <div class="weather-grid">
                    <div class="card current-weather">
                        <div class="weather-main">
                            <div class="weather-info">
                                <h2>${data.name}, ${data.sys.country}</h2>
                                <div class="temperature">${Math.round(data.main.temp)}${tempUnit}</div>
                                <p class="weather-description">${data.weather[0].description}</p>
                                <p style="color: var(--text-light); margin-top: 10px;">Feels like ${Math.round(data.main.feels_like)}${tempUnit}</p>
                            </div>
                            <div class="weather-icon">${icon}</div>
                        </div>

                        <div class="details-grid" style="margin-top: 30px;">
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-droplet"></i> Humidity</div>
                                <div class="detail-value">${data.main.humidity}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-wind"></i> Wind Speed</div>
                                <div class="detail-value">${Math.round(data.wind.speed)} ${windUnit}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-gauge"></i> Pressure</div>
                                <div class="detail-value">${data.main.pressure} mb</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-eye"></i> Visibility</div>
                                <div class="detail-value">${(data.visibility / 1000).toFixed(1)} km</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-arrow-up"></i> Max Temp</div>
                                <div class="detail-value">${Math.round(data.main.temp_max)}${tempUnit}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-arrow-down"></i> Min Temp</div>
                                <div class="detail-value">${Math.round(data.main.temp_min)}${tempUnit}</div>
                            </div>
                        </div>
                    </div>
            `;

            // Air Quality Index
            if (aqData && aqData.list && aqData.list[0]) {
                const aqi = aqData.list[0].main.aqi;
                const aqiLabel = aqiLabels[aqi - 1] || 'Unknown';
                html += `
                    <div class="card">
                        <h3 class="forecast-title"><i class="fas fa-wind"></i> Air Quality</h3>
                        <div class="air-quality">
                            <div class="aqi-badge aqi-${aqi}">${aqi}</div>
                            <div>
                                <p style="font-size: 1.2rem; font-weight: 700; margin-bottom: 8px;">${aqiLabel}</p>
                                <p style="color: var(--text-light);">AQI Index: ${aqi}/5</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 5-Day Forecast
            if (forecast && forecast.list) {
                const dailyForecasts = {};
                forecast.list.forEach(item => {
                    const date = new Date(item.dt * 1000);
                    const day = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    
                    if (!dailyForecasts[day]) {
                        dailyForecasts[day] = {
                            temp: item.main.temp,
                            icon: item.weather[0].icon,
                            description: item.weather[0].description,
                            humidity: item.main.humidity
                        };
                    }
                });

                html += `
                    <div class="card">
                        <h3 class="forecast-title"><i class="fas fa-calendar-days"></i> 5-Day Forecast</h3>
                        <div class="forecast-grid">
                `;

                Object.entries(dailyForecasts).slice(0, 5).forEach(([day, data]) => {
                    const forecastIcon = weatherIconMap[data.icon] || '🌤️';
                    html += `
                        <div class="forecast-item">
                            <div class="forecast-time">${day}</div>
                            <div class="forecast-icon">${forecastIcon}</div>
                            <div class="forecast-temp">${Math.round(data.temp)}${tempUnit}</div>
                            <p style="font-size: 0.8rem; opacity: 0.9; margin-top: 5px; text-transform: capitalize;">${data.description}</p>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            // Hourly Forecast
            if (forecast && forecast.list) {
                html += `
                    <div class="card">
                        <h3 class="forecast-title"><i class="fas fa-hourglass-start"></i> Hourly Forecast (Next 24h)</h3>
                        <div class="forecast-grid">
                `;

                forecast.list.slice(0, 8).forEach(item => {
                    const date = new Date(item.dt * 1000);
                    const time = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                    const hourIcon = weatherIconMap[item.weather[0].icon] || '🌤️';

                    html += `
                        <div class="forecast-item">
                            <div class="forecast-time">${time}</div>
                            <div class="forecast-icon">${hourIcon}</div>
                            <div class="forecast-temp">${Math.round(item.main.temp)}${tempUnit}</div>
                            <p style="font-size: 0.8rem; opacity: 0.9;">💧 ${item.main.humidity}%</p>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            document.getElementById('content').innerHTML = html;
        }

        // Load default city on page load
        window.addEventListener('load', () => {
            fetchWeatherData('London');
        });

        // Allow Enter key to search
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });
    </script>
</body>
</html>
